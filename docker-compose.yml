services:
  postgres:
    image: postgres:15
    container_name: autorizador-db
    environment:
      POSTGRES_DB: autorizador
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: autorizador-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/autorizador
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      - postgres