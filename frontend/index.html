<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autorizador</title>

    <style>
        * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background-color: #16213e;
    padding: 40px;
    border-radius: 10px;
    width: 100%;
    max-width: 420px;
}

h1 {
    color: #e2e8f0;
    text-align: center;
    margin-bottom: 30px;
    font-size: 1.5em;
    font-weight: 400;
}

label {
    display: block;
    color: #94a3b8;
    margin-bottom: 6px;
    font-size: 0.9em;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    background-color: #0f3460;
    border: none;
    border-radius: 6px;
    color: #e2e8f0;
    font-size: 1em;
}

input::placeholder {
    color: #475569;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #533483;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 1em;
    cursor: pointer;
}

button:hover {
    background-color: #6d44ad;
}

#result {
    margin-top: 20px;
    text-align: center;
    font-size: 1.1em;
    font-weight: 600;
    padding: 15px;
    border-radius: 6px;
}
    </style>

</head>

<body>

    <div class="container">
        <h1>Autorizador</h1>

        <div class="form-group">
            <label for="accountId">ID - Conta</label>
            <input type="text" id="accountId" placeholder="Id da conta">
        </div>

        <div class="form-group">
            <label for="amount">Valor - Compra</label>
            <input type="number" id="amount" placeholder="Valor da compra">
        </div>

        <div class="form-group">
            <label for="merchant">Nome - Loja</label>
            <input type="text" id="merchant" placeholder="Nome da loja">
        </div>

        <button id="sendButton">Enviar</button>

        <div id="result"></div>
    </div>

    <script>
        document.getElementById('sendButton').addEventListener('click', function() {
            const accountId = document.getElementById('accountId').value;
            const amount = document.getElementById('amount').value;
            const merchant = document.getElementById('merchant').value;
            fetch('http://localhost:8080/transactions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                accountId: Number(accountId),
                amount: Number(amount),
                merchant: merchant
            })
        }).then(response => response.text())
        .then(text => {
            const result = document.getElementById('result');
            result.textContent = text;
            result.className = 'show'; // Reset classes and add show animation

            if (text === 'APPROVED') {
                result.classList.add('approved');
            } else {
                result.classList.add('denied');
            }
        })
        });
    </script>


</body>
</html>
